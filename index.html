<!DOCTYPE html>
<html>
<head>
  <title>PlantPass Calculator</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0 5px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
    }

    h2, h3 {
      font-size: 20px;
      font-weight: 400;
      text-align: center;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: inline-block;
      width: 50%;
      margin-right: 5%;
    }

    .form-group input[type="number"],
    .form-group input[type="checkbox"],
    .form-group span {
      width: 40%;
      float: right;
    }

    form {
      clear: both;
    }

    button {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-top: 10px;
    }
  </style>
  <script>
    function calculateTotal() {
      var twoInchPrice = 3.0, fourInchPrice = 5.0, threePackPrice = 5.0, fourPackPrice = 5.0,
          fiveHalfSixInchPrice = 8.0, decorativePrice = 20.0, fiveGallonPrice = 25.0;

      var twoInchQty = parseInt(document.getElementById('twoInchQty').value) || 0,
          fourInchQty = parseInt(document.getElementById('fourInchQty').value) || 0,
          threePackQty = parseInt(document.getElementById('threePackQty').value) || 0,
          fourPackQty = parseInt(document.getElementById('fourPackQty').value) || 0,
          fiveHalfSixInchQty = parseInt(document.getElementById('fiveHalfSixInchQty').value) || 0,
          decorativeQty = parseInt(document.getElementById('decorativeQty').value) || 0,
          fiveGallonQty = parseInt(document.getElementById('fiveGallonQty').value) || 0;

      var subtotal = twoInchPrice * twoInchQty + fourInchPrice * fourInchQty +
                     threePackPrice * threePackQty + fourPackPrice * fourPackQty +
                     fiveHalfSixInchPrice * fiveHalfSixInchQty + decorativePrice * decorativeQty +
                     fiveGallonPrice * fiveGallonQty;

      var discountPerennial = document.getElementById('discountPerennial').checked ? 0.05 : 0,
          discountBlooming = document.getElementById('discountBlooming').checked ? 0.05 : 0,
          totalDiscount = discountPerennial + discountBlooming,
          discountAmount = subtotal * totalDiscount,
          total = subtotal - discountAmount;

      document.getElementById('twoInchTotal').innerText = "$" + (twoInchPrice * twoInchQty).toFixed(2);
      document.getElementById('fourInchTotal').innerText = "$" + (fourInchPrice * fourInchQty).toFixed(2);
      document.getElementById('threePackTotal').innerText = "$" + (threePackPrice * threePackQty).toFixed(2);
      document.getElementById('fourPackTotal').innerText = "$" + (fourPackPrice * fourPackQty).toFixed(2);
      document.getElementById('fiveHalfSixInchTotal').innerText = "$" + (fiveHalfSixInchPrice * fiveHalfSixInchQty).toFixed(2);
      document.getElementById('decorativeTotal').innerText = "$" + (decorativePrice * decorativeQty).toFixed(2);
      document.getElementById('fiveGallonTotal').innerText = "$" + (fiveGallonPrice * fiveGallonQty).toFixed(2);

      document.getElementById('subtotal').innerText = "Subtotal: $" + subtotal.toFixed(2);
      document.getElementById('discount').innerText = "Discount: -$" + discountAmount.toFixed(2);
      document.getElementById('total').innerText = "Grand Total: $" + Math.floor(total);
    }
  </script>
</head>
<body>
  <h1>PlantPass Calculator</h1>
  <h2>Spring Plant Fair 2024</h2>
  <form>
    <!-- Input fields and labels as before, adapted for mobile responsiveness -->
    <!-- Similar structure for each form-group with inputs and totals -->
    <!-- Example for one input group: -->
    <div class="form-group">
      <label for="twoInchQty">2 inch $3.00:</label>
      <input type="number" id="twoInchQty" value="0" />
      <span id="twoInchTotal">$0.00</span>
    </div>
    <!-- Repeat structure for each input -->
    <div class="form-group">
      <input type="checkbox" id="discountPerennial" /> Perennial Powerhouse (5%)
    </div>
    <div class="form-group">
      <input type="checkbox" id="discountBlooming" /> Blooming Bundle (5%)
    </div>
    <button type="button" onclick="calculateTotal()">Calculate</button>
    <h3 id="subtotal">Subtotal: $0.00</h3>
    <h3 id="discount">Discount: -$0.00</h3>
    <h3 id="total">Grand Total: $0</h3>
  </form>
</body>
</html>
